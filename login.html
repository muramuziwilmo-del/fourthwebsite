<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="Muramuzi Wilmo " content="This is a hotel website">
<meta name="key words" content="index, rooms, login, booking" >
  <title>Login | Millennium Hotel</title>
  <style>
    /*  RESET & BASE  */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333;   background-color: rgb(169, 169, 169);}
    .container { width: 90%; max-width: 1100px; margin: 0 auto; }

    /*  HEADER */
    header { background: #1a3a32; padding: 1rem 0; position: fixed; width: 100%; top: 0; z-index: 100; }
    nav { display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.5rem; font-weight: bold; color: white; text-decoration: none;   text-shadow: 1px 3px rgba(249, 3, 3, 0.6); }
    .logo span { color: #d4a017; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: white; text-decoration: none; }
    .nav-links a:hover { color: #d4a017; }
    .menu-btn { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }

    /*  LOGIN FORM  */
    .section { padding: 4rem 0; margin-top: 60px; }
    .form-box { max-width: 400px; margin: 0 auto; padding: 2rem 0; }
    .form-box h2 { text-align: center; font-size: 2rem; margin-bottom: 1rem; color: #1a3a32; }
    .form-box p { text-align: center; margin-bottom: 2rem; color: #666; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
    .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ccc; font-size: 1rem; }
    .btn { width: 100%; padding: 1rem; background: #1a3a32; color: white; border: none; font-size: 1rem; cursor: pointer; }
    .btn:hover { background: #d4a017; }

    /*  MOBILE  */
    @media (max-width: 768px) {
      .nav-links { display: none; position: absolute; top: 60px; left: 0; right: 0; background: #1a3a32; flex-direction: column; padding: 1rem; }
      .nav-links.show { display: flex; }
      .menu-btn { display: block; }
    }
  </style>
</head>
<body>
  <!--  HEADER  -->
  <header>
    <div class="container">
      <nav>
        <a href="index.html" class="logo">Millennium<span>Hotel</span></a>
        <button class="menu-btn" onclick="document.getElementById('nav').classList.toggle('show')">☰</button>
        <ul class="nav-links" id="nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="login.html">Book Now</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- LOGIN FORM  -->
  <section class="section">
    <div class="container">
      
      <div class="form-box">
        <h2>Login to Book</h2>
        <p>Sign in to complete your reservation</p>
        <form onsubmit="event.preventDefault(); window.location.href='booking.html';">
          <div class="form-group">
            <label>Email</label>
            <input type="email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" required>
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
       
      </div>
    </div>
  </section>
</body>
</html>
